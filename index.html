<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Texture Converter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111827;
  color: white;
}

.container {
  max-width: 1400px;
  margin: auto;
  padding: 24px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 20px;
  margin-bottom: 24px;
}

.title {
  font-size: 32px;
  font-weight: bold;
}

.lang-buttons {
  display: flex;
  gap: 10px;
}

button {
  border: none;
  background: #2563eb;
  color: white;
  padding: 10px 16px;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
}

.card {
  background: #1f2937;
  border-radius: 16px;
  padding: 20px;
}

.dropzone {
  border: 2px dashed #4b5563;
  border-radius: 14px;
  min-height: 180px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
  padding: 20px;
}

.dropzone:hover {
  border-color: #60a5fa;
}

.dropzone.dragover {
  border-color: #93c5fd;
  background: rgba(96,165,250,0.12);
}

.preview-area {
  margin-top: 30px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 20px;
}

.preview-box {
  background: #1f2937;
  border-radius: 16px;
  padding: 16px;
}

.preview-box img {
  width: 100%;
  background: #0f172a;
  border-radius: 12px;
}

.channel-buttons {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 14px;
}

.status {
  margin-top: 18px;
  color: #93c5fd;
  min-height: 24px;
}

.hidden {
  display: none;
}

.footer {
  margin-top: 40px;
  opacity: 0.7;
}
</style>
</head>
<body>
<div class="container">

<div class="header">
  <div>
    <div class="title" id="title">Texture Converter</div>
    <div id="subtitle">Unity URP ↔ Unreal ORM Converter</div>
  </div>

  <div class="lang-buttons">
    <button id="koBtn">한국어</button>
    <button id="enBtn">English</button>
  </div>
</div>

<div class="grid">

  <div class="card">
    <h2 id="unityTitle">Unity → ORM</h2>
    <div class="dropzone" id="unityDrop">
      <div id="unityDropText">클릭 또는 드래그</div>
    </div>
  </div>

  <div class="card">
    <h2 id="ormTitle">ORM → Unity</h2>
    <div class="dropzone" id="ormDrop">
      <div id="ormDropText">클릭 또는 드래그</div>
    </div>
  </div>

  <div class="card">
    <h2 id="splitTitle">채널 분리</h2>
    <div class="dropzone" id="splitDrop">
      <div id="splitDropText">클릭 또는 드래그</div>
    </div>
  </div>

  <div class="card">
    <h2 id="batchTitle">배치 변환</h2>
    <div class="dropzone" id="batchDrop">
      <div id="batchDropText">폴더 또는 여러 파일</div>
    </div>
  </div>

</div>

<input type="file" id="unityInput" accept="image/png,image/jpeg" class="hidden">
<input type="file" id="ormInput" accept="image/png,image/jpeg" class="hidden">
<input type="file" id="splitInput" accept="image/png,image/jpeg" class="hidden">
<input type="file" id="batchInput" accept="image/png,image/jpeg" multiple webkitdirectory class="hidden">

<div class="preview-area">

  <div class="preview-box">
    <h3 id="beforeLabel">Before</h3>
    <img id="beforePreview">
  </div>

  <div class="preview-box">
    <h3 id="afterLabel">After</h3>
    <img id="afterPreview">

    <div class="channel-buttons">
      <button data-channel="rgb">RGB</button>
      <button data-channel="r">R</button>
      <button data-channel="g">G</button>
      <button data-channel="b">B</button>
      <button data-channel="a">A</button>
    </div>
  </div>

</div>

<div class="status" id="status"></div>

<div class="footer">
PNG/JPG 지원 · ZIP 출력 · GitHub Pages 지원
</div>

</div>

<script>
const statusText = document.getElementById('status');
const beforePreview = document.getElementById('beforePreview');
const afterPreview = document.getElementById('afterPreview');

let currentCanvas = null;
let currentImage = null;

const texts = {
  ko: {
    title: '텍스쳐 컨버터',
    subtitle: 'Unity URP ↔ Unreal ORM 변환',
    unityTitle: 'Unity → ORM',
    ormTitle: 'ORM → Unity',
    splitTitle: '채널 분리',
    batchTitle: '배치 변환',
    beforeLabel: '변환 전',
    afterLabel: '변환 후',
    unityDropText: '클릭 또는 드래그',
    ormDropText: '클릭 또는 드래그',
    splitDropText: '클릭 또는 드래그',
    batchDropText: '폴더 또는 여러 파일'
  },
  en: {
    title: 'Texture Converter',
    subtitle: 'Unity URP ↔ Unreal ORM Converter',
    unityTitle: 'Unity → ORM',
    ormTitle: 'ORM → Unity',
    splitTitle: 'Split Channels',
    batchTitle: 'Batch Process',
    beforeLabel: 'Before',
    afterLabel: 'After',
    unityDropText: 'Click or Drag',
    ormDropText: 'Click or Drag',
    splitDropText: 'Click or Drag',
    batchDropText: 'Folder or Multiple Files'
  }
};

function setLanguage(lang) {
  const t = texts[lang];

  Object.keys(t).forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.textContent = t[id];
    }
  });
}

function setStatus(msg) {
  statusText.textContent = msg;
}

function setupDropzone(dropzone, input, callback) {
  dropzone.addEventListener('click', () => {
    input.value = '';
    input.click();
  });

  input.addEventListener('change', async (e) => {
    const files = [...e.target.files];
    if (files.length) {
      await callback(files);
    }
  });

  dropzone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropzone.classList.add('dragover');
  });

  dropzone.addEventListener('dragleave', () => {
    dropzone.classList.remove('dragover');
  });

  dropzone.addEventListener('drop', async (e) => {
    e.preventDefault();
    dropzone.classList.remove('dragover');

    const files = [...e.dataTransfer.files];

    if (files.length) {
      await callback(files);
    }
  });
}

function downloadCanvas(canvas, filename) {
  canvas.toBlob(blob => {
    const a = document.createElement('a');
    const url = URL.createObjectURL(blob);

    a.href = url;
    a.download = filename;
    a.click();

    setTimeout(() => {
      URL.revokeObjectURL(url);
    }, 1000);
  }, 'image/png');
}

function loadImage(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);

    img.onload = () => {
      URL.revokeObjectURL(url);
      resolve(img);
    };

    img.onerror = () => {
      URL.revokeObjectURL(url);
      reject(new Error('이미지 로드 실패'));
    };

    img.src = url;
  });
}

function createCanvas(w, h) {
  const canvas = document.createElement('canvas');
  canvas.width = w;
  canvas.height = h;
  return canvas;
}

async function unityToORM(files) {
  try {
    const file = files[0];
    const img = await loadImage(file);

    beforePreview.src = img.src;

    const canvas = createCanvas(img.width, img.height);
    const ctx = canvas.getContext('2d');

    ctx.drawImage(img, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;

    for (let i = 0; i < data.length; i += 4) {
      const metallic = data[i];
      const smoothness = data[i + 3];
      const roughness = 255 - smoothness;

      data[i] = 255;
      data[i + 1] = roughness;
      data[i + 2] = metallic;
      data[i + 3] = 255;
    }

    ctx.putImageData(imageData, 0, 0);

    currentCanvas = canvas;
    currentImage = imageData;

    afterPreview.src = canvas.toDataURL('image/png');

    downloadCanvas(canvas, file.name.replace(/\.[^/.]+$/, '') + '_ORM.png');

    setStatus('Unity → ORM 변환 완료');

  } catch (err) {
    console.error(err);
    setStatus(err.message);
  }
}

async function ormToUnity(files) {
  try {
    const file = files[0];
    const img = await loadImage(file);

    beforePreview.src = img.src;

    const canvas = createCanvas(img.width, img.height);
    const ctx = canvas.getContext('2d');

    ctx.drawImage(img, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;

    for (let i = 0; i < data.length; i += 4) {
      const roughness = data[i + 1];
      const metallic = data[i + 2];
      const smoothness = 255 - roughness;

      data[i] = metallic;
      data[i + 1] = metallic;
      data[i + 2] = metallic;
      data[i + 3] = smoothness;
    }

    ctx.putImageData(imageData, 0, 0);

    currentCanvas = canvas;
    currentImage = imageData;

    afterPreview.src = canvas.toDataURL('image/png');

    downloadCanvas(canvas, file.name.replace(/\.[^/.]+$/, '') + '_MetallicSmoothness.png');

    setStatus('ORM → Unity 변환 완료');

  } catch (err) {
    console.error(err);
    setStatus(err.message);
  }
}

async function splitChannels(files) {
  try {
    if (typeof JSZip === 'undefined') {
      throw new Error('JSZip 로딩 실패');
    }

    const file = files[0];
    const img = await loadImage(file);

    beforePreview.src = img.src;

    const sourceCanvas = createCanvas(img.width, img.height);
    const sourceCtx = sourceCanvas.getContext('2d');

    sourceCtx.drawImage(img, 0, 0);

    const imageData = sourceCtx.getImageData(0, 0, img.width, img.height);

    const zip = new JSZip();

    const channels = ['R', 'G', 'B', 'A'];

    for (let c = 0; c < 4; c++) {
      const canvas = createCanvas(img.width, img.height);
      const ctx = canvas.getContext('2d');

      const newData = ctx.createImageData(img.width, img.height);

      for (let i = 0; i < imageData.data.length; i += 4) {
        const value = imageData.data[i + c];

        newData.data[i] = value;
        newData.data[i + 1] = value;
        newData.data[i + 2] = value;
        newData.data[i + 3] = 255;
      }

      ctx.putImageData(newData, 0, 0);

      const blob = await new Promise(resolve => {
        canvas.toBlob(resolve, 'image/png');
      });

      zip.file(`${channels[c]}.png`, blob);

      if (c === 0) {
        currentCanvas = canvas;
        currentImage = newData;
        afterPreview.src = canvas.toDataURL('image/png');
      }
    }

    const zipBlob = await zip.generateAsync({ type: 'blob' });

    const a = document.createElement('a');
    const url = URL.createObjectURL(zipBlob);

    a.href = url;
    a.download = file.name.replace(/\.[^/.]+$/, '') + '_Channels.zip';
    a.click();

    setTimeout(() => URL.revokeObjectURL(url), 1000);

    setStatus('채널 분리 완료');

  } catch (err) {
    console.error(err);
    setStatus(err.message);
  }
}

async function batchProcess(files) {
  try {
    if (typeof JSZip === 'undefined') {
      throw new Error('JSZip 로딩 실패');
    }

    const zip = new JSZip();

    for (const file of files) {

      const lower = file.name.toLowerCase();

      const img = await loadImage(file);

      const canvas = createCanvas(img.width, img.height);
      const ctx = canvas.getContext('2d');

      ctx.drawImage(img, 0, 0);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;

      if (
        lower.includes('orm') ||
        lower.includes('occlusionroughnessmetallic')
      ) {
        for (let i = 0; i < data.length; i += 4) {
          const roughness = data[i + 1];
          const metallic = data[i + 2];
          const smoothness = 255 - roughness;

          data[i] = metallic;
          data[i + 1] = metallic;
          data[i + 2] = metallic;
          data[i + 3] = smoothness;
        }

        ctx.putImageData(imageData, 0, 0);

        const blob = await new Promise(resolve => {
          canvas.toBlob(resolve, 'image/png');
        });

        zip.file(file.name.replace(/\.[^/.]+$/, '') + '_Unity.png', blob);

      } else {

        for (let i = 0; i < data.length; i += 4) {
          const metallic = data[i];
          const smoothness = data[i + 3];
          const roughness = 255 - smoothness;

          data[i] = 255;
          data[i + 1] = roughness;
          data[i + 2] = metallic;
          data[i + 3] = 255;
        }

        ctx.putImageData(imageData, 0, 0);

        const blob = await new Promise(resolve => {
          canvas.toBlob(resolve, 'image/png');
        });

        zip.file(file.name.replace(/\.[^/.]+$/, '') + '_ORM.png', blob);
      }

      canvas.width = 1;
      canvas.height = 1;
    }

    const zipBlob = await zip.generateAsync({ type: 'blob' });

    const a = document.createElement('a');
    const url = URL.createObjectURL(zipBlob);

    a.href = url;
    a.download = 'Batch_Converted.zip';
    a.click();

    setTimeout(() => URL.revokeObjectURL(url), 1000);

    setStatus('배치 처리 완료');

  } catch (err) {
    console.error(err);
    setStatus(err.message);
  }
}

function showChannel(channel) {
  if (!currentImage) return;

  const canvas = createCanvas(currentImage.width, currentImage.height);
  const ctx = canvas.getContext('2d');

  const output = ctx.createImageData(currentImage.width, currentImage.height);

  for (let i = 0; i < currentImage.data.length; i += 4) {

    const r = currentImage.data[i];
    const g = currentImage.data[i + 1];
    const b = currentImage.data[i + 2];
    const a = currentImage.data[i + 3];

    if (channel === 'rgb') {
      output.data[i] = r;
      output.data[i + 1] = g;
      output.data[i + 2] = b;
      output.data[i + 3] = 255;
    }

    if (channel === 'r') {
      output.data[i] = r;
      output.data[i + 1] = r;
      output.data[i + 2] = r;
      output.data[i + 3] = 255;
    }

    if (channel === 'g') {
      output.data[i] = g;
      output.data[i + 1] = g;
      output.data[i + 2] = g;
      output.data[i + 3] = 255;
    }

    if (channel === 'b') {
      output.data[i] = b;
      output.data[i + 1] = b;
      output.data[i + 2] = b;
      output.data[i + 3] = 255;
    }

    if (channel === 'a') {
      output.data[i] = a;
      output.data[i + 1] = a;
      output.data[i + 2] = a;
      output.data[i + 3] = 255;
    }
  }

  ctx.putImageData(output, 0, 0);

  afterPreview.src = canvas.toDataURL('image/png');
}

window.addEventListener('DOMContentLoaded', () => {

  document.getElementById('koBtn').addEventListener('click', () => {
    setLanguage('ko');
  });

  document.getElementById('enBtn').addEventListener('click', () => {
    setLanguage('en');
  });

  setupDropzone(
    document.getElementById('unityDrop'),
    document.getElementById('unityInput'),
    unityToORM
  );

  setupDropzone(
    document.getElementById('ormDrop'),
    document.getElementById('ormInput'),
    ormToUnity
  );

  setupDropzone(
    document.getElementById('splitDrop'),
    document.getElementById('splitInput'),
    splitChannels
  );

  setupDropzone(
    document.getElementById('batchDrop'),
    document.getElementById('batchInput'),
    batchProcess
  );

  document.querySelectorAll('[data-channel]').forEach(btn => {
    btn.addEventListener('click', () => {
      showChannel(btn.dataset.channel);
    });
  });

  setLanguage('ko');

  setStatus('준비 완료');
});
</script>
</body>
</html>
