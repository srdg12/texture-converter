<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Texture Converter</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #111827;
  color: white;
}

.container {
  max-width: 1400px;
  margin: auto;
  padding: 24px;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 20px;
  margin-bottom: 24px;
}

.title {
  font-size: 32px;
  font-weight: bold;
}

.lang-buttons {
  display: flex;
  gap: 10px;
}

button {
  border: none;
  background: #2563eb;
  color: white;
  padding: 10px 16px;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  background: #1d4ed8;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 20px;
}

.card {
  background: #1f2937;
  border-radius: 16px;
  padding: 20px;
}

.dropzone {
  border: 2px dashed #4b5563;
  border-radius: 14px;
  min-height: 180px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  cursor: pointer;
  transition: 0.2s;
  padding: 20px;
}

.dropzone:hover {
  border-color: #60a5fa;
}

.dropzone.dragover {
  border-color: #93c5fd;
  background: rgba(96,165,250,0.12);
}

.preview-area {
  margin-top: 30px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 20px;
}

.preview-box {
  background: #1f2937;
  border-radius: 16px;
  padding: 16px;
}

.preview-box img {
  width: 100%;
  background: #0f172a;
  border-radius: 12px;
}

.channel-buttons {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 14px;
}

.status {
  margin-top: 18px;
  color: #93c5fd;
  min-height: 24px;
}

.hidden {
  display: none;
}

.footer {
  margin-top: 40px;
  opacity: 0.7;
}
</style>
</head>
<body>
<div class="container">

<div class="header">
  <div>
    <div class="title" id="title">Texture Converter</div>
    <div id="subtitle">Unity URP ↔ Unreal ORM Converter</div>
  </div>

  <div class="lang-buttons">
    <button id="koBtn">한국어</button>
    <button id="enBtn">English</button>
  </div>
</div>

<div class="grid">

  <div class="card">
    <h2 id="unityTitle">Unity → ORM</h2>
    <div class="dropzone" id="unityDrop">
      <div id="unityDropText">클릭 또는 드래그</div>
    </div>
  </div>

  <div class="card">
    <h2 id="ormTitle">ORM → Unity</h2>
    <div class="dropzone" id="ormDrop">
      <div id="ormDropText">클릭 또는 드래그</div>
    </div>
  </div>

  <div class="card">
    <h2 id="splitTitle">채널 분리</h2>
    <div class="dropzone" id="splitDrop">
      <div id="splitDropText">클릭 또는 드래그</div>
    </div>
  </div>

  <div class="card">
    <h2 id="batchTitle">배치 변환</h2>
    <div class="dropzone" id="batchDrop">
      <div id="batchDropText">폴더 또는 여러 파일</div>
    </div>
  </div>

</div>

<input type="file" id="unityInput" accept="image/png,image/jpeg" class="hidden">
<input type="file" id="ormInput" accept="image/png,image/jpeg" class="hidden">
<input type="file" id="splitInput" accept="image/png,image/jpeg" class="hidden">
<input type="file" id="batchInput" accept="image/png,image/jpeg" multiple webkitdirectory class="hidden">

<div class="preview-area">

  <div class="preview-box">
    <h3 id="beforeLabel">Before</h3>
    <img id="beforePreview">
  </div>

  <div class="preview-box">
    <h3 id="afterLabel">After</h3>
    <img id="afterPreview">

    <div class="channel-buttons">
      <button data-channel="rgb">RGB</button>
      <button data-channel="r">R</button>
      <button data-channel="g">G</button>
      <button data-channel="b">B</button>
      <button data-channel="a">A</button>
    </div>
  </div>

</div>

<div class="status" id="status"></div>

<div class="footer">
PNG/JPG 지원 · ZIP 출력 · GitHub Pages 지원
</div>

</div>

<script>
const statusText = document.getElementById('status');
const beforePreview = document.getElementById('beforePreview');
const afterPreview = document.getElementById('afterPreview');

let currentImageData = null;
let beforeImageData = null;
let batchMode = 'orm';

const texts = {
  ko: {
    ready: '준비 완료',
    mergeDone: 'RGBA 병합 완료',
    batchDone: '배치 병합 완료'
  },
  en: {
    ready: 'Ready',
    mergeDone: 'RGBA Merge Complete',
    batchDone: 'Batch Merge Complete'
  }
};

function setStatus(msg){
  statusText.textContent = msg;
}

function createCanvas(w,h){
  const c = document.createElement('canvas');
  c.width = w;
  c.height = h;
  return c;
}

function loadImage(file){
  return new Promise((resolve,reject)=>{
    const img = new Image();
    const url = URL.createObjectURL(file);

    img.onload = ()=>{
      resolve(img);
      setTimeout(()=>URL.revokeObjectURL(url),1000);
    };

    img.onerror = ()=>{
      URL.revokeObjectURL(url);
      reject(new Error('이미지 로드 실패'));
    };

    img.src = url;
  });
}

function setupDropzone(dropzone,input,callback){
  dropzone.addEventListener('click',()=>{
    input.value='';
    input.click();
  });

  input.addEventListener('change', async e=>{
    const files=[...e.target.files];
    if(files.length) await callback(files);
  });

  dropzone.addEventListener('dragover',e=>{
    e.preventDefault();
    dropzone.classList.add('dragover');
  });

  dropzone.addEventListener('dragleave',()=>{
    dropzone.classList.remove('dragover');
  });

  dropzone.addEventListener('drop',async e=>{
    e.preventDefault();
    dropzone.classList.remove('dragover');

    const files=[...e.dataTransfer.files];
    if(files.length) await callback(files);
  });
}

function downloadBlob(blob,name){
  const a=document.createElement('a');
  const url=URL.createObjectURL(blob);

  a.href=url;
  a.download=name;
  a.click();

  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

function previewImageData(imageData,target){
  const canvas=createCanvas(imageData.width,imageData.height);
  const ctx=canvas.getContext('2d');
  ctx.putImageData(imageData,0,0);
  target.src=canvas.toDataURL('image/png');
}

function extractChannel(imageData,channel){
  const out=new ImageData(imageData.width,imageData.height);

  for(let i=0;i<imageData.data.length;i+=4){
    const r=imageData.data[i];
    const g=imageData.data[i+1];
    const b=imageData.data[i+2];
    const a=imageData.data[i+3];

    if(channel==='rgb'){
      out.data[i]=r;
      out.data[i+1]=g;
      out.data[i+2]=b;
      out.data[i+3]=255;
      continue;
    }

    let v=0;

    if(channel==='r') v=r;
    if(channel==='g') v=g;
    if(channel==='b') v=b;
    if(channel==='a') v=a;

    out.data[i]=v;
    out.data[i+1]=v;
    out.data[i+2]=v;
    out.data[i+3]=255;
  }

  return out;
}

async function getImageDataFromFile(file){
  const img=await loadImage(file);

  const canvas=createCanvas(img.width,img.height);
  const ctx=canvas.getContext('2d');

  ctx.drawImage(img,0,0);

  return ctx.getImageData(0,0,img.width,img.height);
}

async function unityToORM(files){
  try{
    const file=files[0];

    const imageData=await getImageDataFromFile(file);

    beforeImageData=imageData;
    previewImageData(imageData,beforePreview);

    const out=new ImageData(imageData.width,imageData.height);

    for(let i=0;i<imageData.data.length;i+=4){
      const metallic=imageData.data[i];
      const smoothness=imageData.data[i+3];

      out.data[i]=255;
      out.data[i+1]=255-smoothness;
      out.data[i+2]=metallic;
      out.data[i+3]=255;
    }

    currentImageData=out;
    previewImageData(out,afterPreview);

    const canvas=createCanvas(out.width,out.height);
    canvas.getContext('2d').putImageData(out,0,0);

    canvas.toBlob(blob=>{
      downloadBlob(blob,file.name.replace(/\.[^/.]+$/,'')+'_ORM.png');
    },'image/png');

    setStatus('Unity → ORM 완료');

  }catch(err){
    console.error(err);
    setStatus(err.message);
  }
}

async function ormToUnity(files){
  try{
    const file=files[0];

    const imageData=await getImageDataFromFile(file);

    beforeImageData=imageData;
    previewImageData(imageData,beforePreview);

    const out=new ImageData(imageData.width,imageData.height);

    for(let i=0;i<imageData.data.length;i+=4){
      const roughness=imageData.data[i+1];
      const metallic=imageData.data[i+2];

      out.data[i]=metallic;
      out.data[i+1]=metallic;
      out.data[i+2]=metallic;
      out.data[i+3]=255-roughness;
    }

    currentImageData=out;
    previewImageData(out,afterPreview);

    const canvas=createCanvas(out.width,out.height);
    canvas.getContext('2d').putImageData(out,0,0);

    canvas.toBlob(blob=>{
      downloadBlob(blob,file.name.replace(/\.[^/.]+$/,'')+'_MetallicSmoothness.png');
    },'image/png');

    setStatus('ORM → Unity 완료');

  }catch(err){
    console.error(err);
    setStatus(err.message);
  }
}

async function splitChannels(files){
  try{
    if(typeof JSZip==='undefined') throw new Error('JSZip 로딩 실패');

    const file=files[0];
    const imageData=await getImageDataFromFile(file);

    beforeImageData=imageData;
    previewImageData(imageData,beforePreview);

    const zip=new JSZip();
    const names=['R','G','B','A'];

    for(let c=0;c<4;c++){
      const channel=['r','g','b','a'][c];
      const out=extractChannel(imageData,channel);

      const canvas=createCanvas(out.width,out.height);
      canvas.getContext('2d').putImageData(out,0,0);

      const blob=await new Promise(resolve=>canvas.toBlob(resolve,'image/png'));

      zip.file(names[c]+'.png',blob);
    }

    const zipBlob=await zip.generateAsync({type:'blob'});
    downloadBlob(zipBlob,file.name.replace(/\.[^/.]+$/,'')+'_Channels.zip');

    setStatus('채널 분리 완료');

  }catch(err){
    console.error(err);
    setStatus(err.message);
  }
}

async function batchProcess(files){
  try{
    if(typeof JSZip==='undefined') throw new Error('JSZip 로딩 실패');

    const zip=new JSZip();
    const groups={};

    for(const file of files){
      const name=file.name.toLowerCase();

      let key=name
        .replace(/ao|occlusion/g,'')
        .replace(/roughness/g,'')
        .replace(/metallic/g,'')
        .replace(/smoothness/g,'')
        .replace(/_/g,'')
        .replace(/-/g,'')
        .replace(/\.[^/.]+$/,'');

      if(!groups[key]) groups[key]={};

      if(name.includes('ao')||name.includes('occlusion')) groups[key].ao=file;
      if(name.includes('roughness')) groups[key].roughness=file;
      if(name.includes('metallic')) groups[key].metallic=file;
      if(name.includes('smoothness')) groups[key].smoothness=file;
    }

    for(const key in groups){
      const g=groups[key];

      const base=g.ao||g.roughness||g.metallic||g.smoothness;
      if(!base) continue;

      const baseData=await getImageDataFromFile(base);
      const width=baseData.width;
      const height=baseData.height;

      async function loadGray(file){
        if(!file) return null;
        const d=await getImageDataFromFile(file);
        return d.data;
      }

      const ao=await loadGray(g.ao);
      const roughness=await loadGray(g.roughness);
      const metallic=await loadGray(g.metallic);
      const smoothness=await loadGray(g.smoothness);

      const out=new ImageData(width,height);

      for(let i=0;i<out.data.length;i+=4){

        if(batchMode==='orm'){
          out.data[i]=ao?ao[i]:255;
          out.data[i+1]=roughness?roughness[i]:(smoothness?255-smoothness[i]:255);
          out.data[i+2]=metallic?metallic[i]:0;
          out.data[i+3]=255;
        }

        if(batchMode==='metallic'){
          const metallicValue=metallic?metallic[i]:0;

          let smoothnessValue=255;

          if(smoothness) smoothnessValue=smoothness[i];
          if(roughness) smoothnessValue=255-roughness[i];

          out.data[i]=metallicValue;
          out.data[i+1]=metallicValue;
          out.data[i+2]=metallicValue;
          out.data[i+3]=smoothnessValue;
        }
      }

      const canvas=createCanvas(width,height);
      canvas.getContext('2d').putImageData(out,0,0);

      const blob=await new Promise(resolve=>canvas.toBlob(resolve,'image/png'));

      zip.file(key+'_'+batchMode+'.png',blob);
    }

    const zipBlob=await zip.generateAsync({type:'blob'});
    downloadBlob(zipBlob,'Merged_Textures.zip');

    setStatus(texts.ko.batchDone);

  }catch(err){
    console.error(err);
    setStatus(err.message);
  }
}

function addBeforeButtons(){
  const box=document.querySelector('.preview-box');

  const wrap=document.createElement('div');
  wrap.className='channel-buttons';

  wrap.innerHTML=`
    <button data-before="rgb">RGB</button>
    <button data-before="r">R</button>
    <button data-before="g">G</button>
    <button data-before="b">B</button>
    <button data-before="a">A</button>
  `;

  box.appendChild(wrap);

  document.querySelectorAll('[data-before]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if(!beforeImageData) return;
      previewImageData(extractChannel(beforeImageData,btn.dataset.before),beforePreview);
    });
  });
}

function addBatchSelector(){
  const card=document.querySelector('#batchDrop').parentElement;

  const wrap=document.createElement('div');
  wrap.style.marginTop='12px';

  wrap.innerHTML=`
    <select id="batchModeSelect" style="padding:10px;border-radius:10px;background:#111827;color:white;border:none;width:100%;">
      <option value="orm">Merge → ORM</option>
      <option value="metallic">Merge → MetallicSmoothness</option>
    </select>
  `;

  card.appendChild(wrap);

  document.getElementById('batchModeSelect').addEventListener('change',e=>{
    batchMode=e.target.value;
  });
}

function addRGBAMerge(){
  const card=document.createElement('div');
  card.className='card';

  card.innerHTML=`
    <h2>RGBA Merge</h2>
    <div style="display:grid;gap:10px;">
      <input type="file" id="rInput" accept="image/png,image/jpeg">
      <input type="file" id="gInput" accept="image/png,image/jpeg">
      <input type="file" id="bInput" accept="image/png,image/jpeg">
      <input type="file" id="aInput" accept="image/png,image/jpeg">
      <button id="mergeBtn">Merge Channels</button>
    </div>
  `;

  document.querySelector('.grid').appendChild(card);

  document.getElementById('mergeBtn').addEventListener('click',async()=>{
    try{
      const rFile=document.getElementById('rInput').files[0];
      const gFile=document.getElementById('gInput').files[0];
      const bFile=document.getElementById('bInput').files[0];
      const aFile=document.getElementById('aInput').files[0];

      const base=rFile||gFile||bFile||aFile;
      if(!base) throw new Error('텍스쳐 필요');

      const baseData=await getImageDataFromFile(base);
      const width=baseData.width;
      const height=baseData.height;

      async function getGray(file){
        if(!file) return null;
        return (await getImageDataFromFile(file)).data;
      }

      const r=await getGray(rFile);
      const g=await getGray(gFile);
      const b=await getGray(bFile);
      const a=await getGray(aFile);

      const out=new ImageData(width,height);

      for(let i=0;i<out.data.length;i+=4){
        out.data[i]=r?r[i]:0;
        out.data[i+1]=g?g[i]:0;
        out.data[i+2]=b?b[i]:0;
        out.data[i+3]=a?a[i]:255;
      }

      currentImageData=out;
      previewImageData(out,afterPreview);

      const canvas=createCanvas(width,height);
      canvas.getContext('2d').putImageData(out,0,0);

      canvas.toBlob(blob=>{
        downloadBlob(blob,'Merged_RGBA.png');
      },'image/png');

      setStatus(texts.ko.mergeDone);

    }catch(err){
      console.error(err);
      setStatus(err.message);
    }
  });
}

window.addEventListener('DOMContentLoaded',()=>{

  setupDropzone(
    document.getElementById('unityDrop'),
    document.getElementById('unityInput'),
    unityToORM
  );

  setupDropzone(
    document.getElementById('ormDrop'),
    document.getElementById('ormInput'),
    ormToUnity
  );

  setupDropzone(
    document.getElementById('splitDrop'),
    document.getElementById('splitInput'),
    splitChannels
  );

  setupDropzone(
    document.getElementById('batchDrop'),
    document.getElementById('batchInput'),
    batchProcess
  );

  document.querySelectorAll('[data-channel]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if(!currentImageData) return;
      previewImageData(extractChannel(currentImageData,btn.dataset.channel),afterPreview);
    });
  });

  addBeforeButtons();
  addBatchSelector();
  addRGBAMerge();

  setStatus(texts.ko.ready);
});
</script>
</body>
</html>
